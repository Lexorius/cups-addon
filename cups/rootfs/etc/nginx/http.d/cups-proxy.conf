# Reverse proxy on :8631 → cupsd on :631
# Strips Content-Security-Policy and X-Frame-Options so the CUPS web UI
# can be embedded inside a hass_ingress iframe.

server {
    listen 8631;

    # Local networks only
    allow 127.0.0.1;
    allow 10.0.0.0/8;
    allow 172.16.0.0/12;
    allow 192.168.0.0/16;
    allow 169.254.0.0/16;
    deny  all;

    # No upload size limit — print jobs can be large
    client_max_body_size 0;

    location / {
        proxy_pass         http://127.0.0.1:631;
        proxy_http_version 1.1;

        # CUPS expects Host: localhost (it builds absolute URLs from this)
        proxy_set_header Host              localhost;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header Connection        "";

        # Hide upstream framing/CSP headers, replace with permissive ones
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header X-Frame-Options;
        add_header X-Frame-Options          "ALLOWALL"          always;
        add_header Content-Security-Policy  "frame-ancestors *" always;

        # Generous timeouts for slow print queues
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering         off;
        proxy_request_buffering off;
    }
}
