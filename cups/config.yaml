---
version: "2.0.2"
slug: cups
name: CUPS Print Server
description: >-
  CUPS Print Server with full driver stack for Raspberry Pi 4 (aarch64/armv7)
  and persistent printer configuration. Supports USB and network printers
  and integration with hass_ingress. Uses bridged networking with explicit
  port mapping for reliable :631 reachability.
url: https://github.com/Lexorius/cups-addon
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
hassio_api: true

# Bridged networking with explicit port forwarding.
# Avoids :631 conflicts with anything else on the HA host and makes the
# Web UI reliably reachable. Trade-off: mDNS/AirPrint auto-discovery is
# unreliable across the docker bridge, so iOS clients need to add the
# printer manually via ipp://<HA-IP>:631/printers/<name>.
host_network: false

# No internal ingress — use hass_ingress (HACS) instead.
ingress: false

# USB support for direct-attached printers (independent of network mode).
usb: true
full_access: true

# Permissions for raw USB access
privileged:
  - SYS_RAWIO
  - SYS_ADMIN

# Persistent storage
map:
  - data:rw
  - share:rw

init: false
startup: services

# In bridged mode these mappings are authoritative.
ports:
  631/tcp: 631
  8631/tcp: 8631
  5353/udp: 5353

ports_description:
  631/tcp: CUPS web UI and IPP printing
  8631/tcp: Reverse-proxied web UI for hass_ingress (CSP/X-Frame headers stripped)
  5353/udp: Avahi/mDNS (limited reach in bridged mode — see README)

options:
  admin_username: "admin"
  admin_password: "changeme"
  log_level: "warn"
  reset_config: false

schema:
  admin_username: str
  admin_password: password
  log_level: list(debug2|debug|info|warn|error|none)
  reset_config: bool
